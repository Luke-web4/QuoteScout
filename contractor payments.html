<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuoteScout Payment</title>

<link rel="stylesheet" href="contractor-style.css">

</head>


<body>


<header>

<div class="logo">
    <span>Quote</span>Scout
</div>

</header>





<section class="pricing-page">


<div class="plan-card">


<h1>
Complete Your Subscription
</h1>


<p>
You are joining QuoteScout as a contractor partner.
</p>



<div id="selectedPlan">


<h2>
Starter Plan
</h2>


<div class="price">
$50<span>/month</span>
</div>


</div>





<form>


<label>
Business Name
</label>

<input 
type="text"
placeholder="Your company name"
required>




<label>
Business Email
</label>

<input 
type="email"
placeholder="Business email"
required>





<label>
Phone Number
</label>

<input
type="tel"
placeholder="Phone number"
required>





<label>
Service Type
</label>


<select>

<option>
Roofing
</option>

<option>
Plumbing
</option>

<option>
HVAC
</option>

<option>
Electrical
</option>

<option>
Remodeling
</option>

<option>
Landscaping
</option>

</select>





<button type="submit">

Continue To Payment

</button>



</form>



</div>



</section>



</body>

</html>
