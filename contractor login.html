<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuoteScout Contractor Login</title>

<link rel="stylesheet" href="contractor-style.css">

</head>


<body>



<header>


<div class="logo">
    <span>Quote</span>Scout
</div>


</header>







<section class="pricing-page">



<div class="plan-card">


<h1>
Contractor Login
</h1>


<p>
Access your QuoteScout leads and business dashboard.
</p>





<form id="contractorLogin">



<label>
Email
</label>


<input
type="email"
id="email"
placeholder="Business email"
required>






<label>
Password
</label>


<input
type="password"
id="password"
placeholder="Password"
required>






<button type="submit">
Login
</button>



<p id="loginMessage"></p>



</form>



</div>




</section>







<script src="contractor-login.js"></script>


</body>

</html>
